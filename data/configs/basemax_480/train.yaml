dataset:
    "class_path": burn_emulator.datasets.IgnitionDataset
    "init_args":
        ignitions_path: /mnt/data/dschmidt/cbp_approx_poc/training_data_v7/legalmax/ignition_locations.csv
        fuels_paths:
            -  /mnt/data/dschmidt/cbp_approx_poc/legalmax_baseline_FF_20260624
            -  /mnt/data/dschmidt/cbp_approx_poc/legalmax_legalmax_FF_20260624
        burn_paths:
            -  /mnt/data/dschmidt/cbp_approx_poc/training_data_v7/legalmax/baseline
            -  /mnt/data/dschmidt/cbp_approx_poc/training_data_v7/legalmax/legalmax
        topo_path: /mnt/data/dschmidt/cbp_approx_poc/topo
        stats_path: /mnt/data/mtruong/burn_emulator/data/stats.yaml
        burn_times: [480]
        chip_size: 256
        jitter: 1
        ignition_only: false
dataloader:
    "class_path": torch.utils.data.DataLoader
    "init_args":
        batch_size: 16
        shuffle: true
        pin_memory: false
        drop_last: true
optimizer:
    "class_path": torch.optim.AdamW
    "init_args":
        lr: .0003
criterion:
    "class_path": torch.nn.BCEWithLogitsLoss
    "init_args": {}
num_epochs: 64