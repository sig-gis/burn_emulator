dataset:
    class_path: burn_emulator.datasets.IgnitionDataset
    init_args:
        ignitions_path: data/training_data_v9/legalmax/ignition_locations.csv
        fuels_paths:
            -  data/legalmax_baseline_FF_20260624
            -  data/legalmax_legalmax_FF_20260624
        burn_paths:
            -  data/training_data_v9/legalmax/baseline
            -  data/training_data_v9/legalmax/legalmax
        topo_path: data/topo
        stats_path: data/stats.yaml
        burn_times: [480]
        chip_size: 128
        jitter: null

dataloader:
    class_path: torch.utils.data.DataLoader
    init_args:
        batch_size: 16
        # batch_size: 32
        shuffle: true
        pin_memory: false
        drop_last: true
optimizer:
    class_path: torch.optim.AdamW
    init_args:
        lr: .0001
criterion:
    class_path: torch.nn.BCEWithLogitsLoss
    init_args: {}
num_epochs: 128